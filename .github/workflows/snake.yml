name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0,12 * * *"   # twice daily — fresh snake without hammering the API
  workflow_dispatch:          # manual trigger from the Actions tab

# Required for newer repos where GITHUB_TOKEN is read-only by default
permissions:
  contents: write

# Cancel in-progress runs so only one snake job writes to the output branch at a time
concurrency:
  group: snake-animation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snakes
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-snake.svg
            output/github-snake-dark.svg?palette=github-dark
            output/github-snake-brand.svg?color_snake=#7c3aed&color_dots=#0d1117,#0a1628,#0055ff,#00b8a9,#00ffb3

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
